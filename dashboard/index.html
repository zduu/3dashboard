<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D打印数据看板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg-a: #f2f9ff;
      --bg-b: #ffe5c8;
      --ink: #0f2238;
      --muted: #5f7084;
      --card: rgba(255,255,255,.80);
      --line: rgba(15,34,56,.12);
      --accent-1: #ff5a36;
      --accent-2: #1f8ed8;
      --accent-3: #3f9142;
      --shadow: 0 10px 26px rgba(7,35,66,.12);
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      font-family: "Noto Sans SC", "Space Grotesk", sans-serif;
      background:
        radial-gradient(1100px 500px at 5% -15%, #a7ddff 0%, transparent 62%),
        radial-gradient(800px 450px at 98% 0%, #ffd5a7 0%, transparent 64%),
        linear-gradient(130deg, var(--bg-a), var(--bg-b));
    }

    .wrap {
      width: 100vw;
      height: 100vh;
      padding: 10px 12px 12px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 8px;
    }

    .header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 10px;
    }
    .title {
      margin: 0;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
      font-size: clamp(24px, 2.4vw, 36px);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }
    .meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .pill {
      border:1px solid var(--line);
      border-radius:999px;
      padding:2px 9px;
      background:rgba(255,255,255,.65);
      white-space: nowrap;
    }

    .cards { display:grid; grid-template-columns: repeat(6, minmax(120px,1fr)); gap:8px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 8px 10px;
      backdrop-filter: blur(8px);
    }
    .k { font-size: 12px; color: var(--muted); }
    .v {
      margin-top: 2px;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(22px, 2.2vw, 30px);
      font-weight: 700;
      line-height: 1.05;
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: 2.15fr 1fr;
      gap: 8px;
    }

    .charts {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .tables {
      min-height: 0;
      display: grid;
      grid-template-rows: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .panel {
      min-height: 0;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 7px 8px 8px;
      overflow: hidden;
    }
    .panel h3 {
      margin: 0 2px 4px;
      font-size: 13px;
      line-height: 1.2;
    }
    .chart { width: 100%; height: calc(100% - 18px); }
    .table-wrap { height: calc(100% - 20px); overflow: hidden; }

    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th, td {
      text-align: left;
      padding: 4px 4px;
      border-bottom: 1px dashed var(--line);
      word-break: break-all;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 500; }
    .empty { color:#8190a0; padding:8px 4px; font-size:11px; }

    @media (max-width: 1280px), (max-height: 740px) {
      body { overflow: auto; }
      .wrap { height: auto; min-height: 100vh; }
      .main { grid-template-columns: 1fr; }
      .charts { grid-template-columns: repeat(2, minmax(0,1fr)); grid-template-rows: repeat(3, minmax(260px,1fr)); }
      .tables { grid-template-rows: repeat(3, minmax(240px,1fr)); }
    }

    @media (max-width: 900px) {
      .cards { grid-template-columns: repeat(3, minmax(120px,1fr)); }
      .charts { grid-template-columns: 1fr; grid-template-rows: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="header">
      <div>
        <h1 class="title">3D打印运营展示板</h1>
        <div class="meta">
          <span class="pill" id="gen"></span>
          <span class="pill" id="src"></span>
          <span class="pill" id="range"></span>
          <span class="pill" id="latest"></span>
        </div>
      </div>
    </section>

    <section class="cards" id="cards"></section>

    <section class="main">
      <section class="charts">
        <div class="panel"><h3>3D订单日趋势</h3><div class="chart" id="c_order_trend"></div></div>
        <div class="panel"><h3>3D助管操作日趋势</h3><div class="chart" id="c_action_trend"></div></div>
        <div class="panel"><h3>订单状态分布</h3><div class="chart" id="c_status"></div></div>
        <div class="panel"><h3>打印工艺分布</h3><div class="chart" id="c_print"></div></div>
        <div class="panel"><h3>订单用途分布</h3><div class="chart" id="c_purpose"></div></div>
        <div class="panel"><h3>助管操作类型分布</h3><div class="chart" id="c_action_type"></div></div>
      </section>

      <section class="tables">
        <div class="panel"><h3>最近3D订单</h3><div class="table-wrap" id="t_orders"></div></div>
        <div class="panel"><h3>最近3D助管操作</h3><div class="table-wrap" id="t_actions"></div></div>
        <div class="panel"><h3>筛选抓取摘要</h3><div class="table-wrap" id="t_filters"></div></div>
      </section>
    </section>
  </div>

  <script>
    const DATA = {"元信息": {"生成时间": "2026-03-07 23:57:14", "数据源类型": "筛选批次", "数据源路径": "output\\filters_20260307_235643", "统计区间": "2026-02-07 ~ 2026-03-07", "最新统计日期": "2026-03-07", "指标口径": "仅统计3D打印订单（process_type=thdprint或工艺字段命中3D）"}, "指标卡": {"统计区间3D订单总量": 426, "本月订单": 262, "今日新增": 35, "待审核": 8, "打印中": 13, "待取件": 232}, "趋势": {"3D订单日趋势": [{"date": "2026-02-07", "count": 7}, {"date": "2026-02-08", "count": 9}, {"date": "2026-02-09", "count": 11}, {"date": "2026-02-10", "count": 1}, {"date": "2026-02-23", "count": 8}, {"date": "2026-02-24", "count": 9}, {"date": "2026-02-25", "count": 24}, {"date": "2026-02-26", "count": 21}, {"date": "2026-02-27", "count": 43}, {"date": "2026-02-28", "count": 31}, {"date": "2026-03-01", "count": 18}, {"date": "2026-03-02", "count": 36}, {"date": "2026-03-03", "count": 46}, {"date": "2026-03-04", "count": 50}, {"date": "2026-03-05", "count": 31}, {"date": "2026-03-06", "count": 46}, {"date": "2026-03-07", "count": 35}], "3D助管操作日趋势": [{"date": "2026-02-07", "count": 22}, {"date": "2026-02-08", "count": 31}, {"date": "2026-02-09", "count": 1}, {"date": "2026-02-11", "count": 10}, {"date": "2026-02-23", "count": 7}, {"date": "2026-02-24", "count": 14}, {"date": "2026-02-25", "count": 21}, {"date": "2026-02-26", "count": 42}, {"date": "2026-02-27", "count": 78}, {"date": "2026-02-28", "count": 49}, {"date": "2026-03-01", "count": 47}, {"date": "2026-03-02", "count": 82}, {"date": "2026-03-03", "count": 81}, {"date": "2026-03-04", "count": 105}, {"date": "2026-03-05", "count": 53}, {"date": "2026-03-06", "count": 90}, {"date": "2026-03-07", "count": 59}]}, "分布": {"订单状态": [{"name": "待取件", "count": 232}, {"name": "已完成", "count": 85}, {"name": "已拒绝", "count": 56}, {"name": "已取消", "count": 32}, {"name": "打印中", "count": 13}, {"name": "待审核", "count": 8}], "订单用途": [{"name": "课题/项目", "count": 207}, {"name": "课程", "count": 163}, {"name": "竞赛", "count": 54}, {"name": "未分类", "count": 2}], "打印工艺": [{"name": "FDM（熔融沉积）", "count": 419}, {"name": "FDM/FFF（熔丝制 ": 2, "错误": ""}]}};

    const meta = DATA["元信息"] || {};
    document.getElementById("gen").textContent = "生成时间：" + (meta["生成时间"] || "--");
    document.getElementById("src").textContent = "数据源：" + (meta["数据源类型"] || "未知");
    document.getElementById("range").textContent = "统计区间：" + (meta["统计区间"] || "--");
    document.getElementById("latest").textContent = "最新统计日期：" + (meta["最新统计日期"] || "--");

    const cardsRoot = document.getElementById("cards");
    const cards = DATA["指标卡"] || {};
    Object.entries(cards).forEach(([k,v]) => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `<div class="k">${k}</div><div class="v">${Number(v || 0).toLocaleString("zh-CN")}</div>`;
      cardsRoot.appendChild(div);
    });

    function lineChart(id, list, color) {
      const chart = echarts.init(document.getElementById(id));
      const x = (list || []).map(i => i.date);
      const y = (list || []).map(i => i.count);
      chart.setOption({
        animationDuration: 700,
        grid: {left: 38, right: 8, top: 22, bottom: 26},
        tooltip: {trigger: "axis"},
        xAxis: {type: "category", data: x, axisLabel: {color: "#5f7084", fontSize: 10, interval: Math.max(0, Math.floor(x.length / 8))}},
        yAxis: {type: "value", axisLabel: {color: "#5f7084", fontSize: 10}, splitLine: {lineStyle: {color: "rgba(15,34,56,.08)"}}},
        series: [{
          type: "line",
          data: y,
          smooth: true,
          symbolSize: 6,
          areaStyle: {opacity: .10},
          lineStyle: {width: 2.5, color},
          itemStyle: {color},
          label: {show: true, position: "top", color: "#3b4e61", fontSize: 10}
        }]
      });
      return chart;
    }

    function barChart(id, items, color) {
      const chart = echarts.init(document.getElementById(id));
      const names = (items || []).map(i => i.name);
      const values = (items || []).map(i => i.count);
      chart.setOption({
        animationDuration: 700,
        grid: {left: 88, right: 28, top: 22, bottom: 14},
        tooltip: {trigger: "axis", axisPointer: {type: "shadow"}},
        xAxis: {type: "value", axisLabel: {color: "#5f7084", fontSize: 10}, splitLine: {lineStyle: {color: "rgba(15,34,56,.08)"}}},
        yAxis: {type: "category", data: names, axisLabel: {color: "#5f7084", fontSize: 10, width: 86, overflow: "truncate"}},
        series: [{
          type: "bar",
          data: values,
          itemStyle: {color, borderRadius: [0, 7, 7, 0]},
          label: {show: true, position: "right", color: "#32475a", fontSize: 10}
        }]
      });
      return chart;
    }

    function pieChart(id, items) {
      const chart = echarts.init(document.getElementById(id));
      chart.setOption({
        animationDuration: 700,
        tooltip: {trigger: "item"},
        legend: {bottom: 0, textStyle: {color: "#5f7084", fontSize: 10}},
        series: [{
          type: "pie",
          radius: ["32%", "66%"],
          center: ["50%", "40%"],
          data: (items || []).map(i => ({name: i.name, value: i.count})),
          label: {show: true, formatter: "{b}: {c}", color: "#3a4d60", fontSize: 10},
          labelLine: {length: 9, length2: 7}
        }]
      });
      return chart;
    }

    function drawTable(id, rows, maxRows = 8) {
      const root = document.getElementById(id);
      if (!rows || !rows.length) {
        root.innerHTML = '<div class="empty">暂无数据</div>';
        return;
      }
      const data = rows.slice(0, maxRows);
      const cols = Object.keys(data[0]);
      const thead = '<thead><tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr></thead>';
      const tbody = '<tbody>' + data.map(r => '<tr>' + cols.map(c => `<td>${r[c] ?? ""}</td>`).join('') + '</tr>').join('') + '</tbody>';
      root.innerHTML = `<table>${thead}${tbody}</table>`;
    }

    const trends = DATA["趋势"] || {};
    const dist = DATA["分布"] || {};
    const tables = DATA["表格"] || {};

    const charts = [];
    charts.push(lineChart("c_order_trend", trends["3D订单日趋势"] || [], "#ff5a36"));
    charts.push(lineChart("c_action_trend", trends["3D助管操作日趋势"] || [], "#1f8ed8"));
    charts.push(pieChart("c_status", dist["订单状态"] || []));
    charts.push(pieChart("c_print", dist["打印工艺"] || []));
    charts.push(barChart("c_purpose", dist["订单用途"] || [], "#3f9142"));
    charts.push(barChart("c_action_type", dist["助管操作类型"] || [], "#2d80c2"));

    drawTable("t_orders", tables["最近3D订单"] || [], 8);
    drawTable("t_actions", tables["最近3D助管操作"] || [], 8);
    drawTable("t_filters", tables["筛选抓取摘要"] || [], 6);

    window.addEventListener("resize", () => charts.forEach(c => c && c.resize()));
  </script>
</body>
</html>
